services:
  # Nginxリバースプロキシ（HTTPS終端）+ ModSecurity WAF
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: trans_nginx
    restart: unless-stopped
    environment:
      # ModSecurity: On=強制ブロック / DetectionOnly=検知のみ / Off=無効
      MODSEC_RULE_ENGINE: "On"
      # パラノイアレベル1: 最小限のルール（誤検知を最小化）
      PARANOIA: "1"
      # 異常スコアの閾値（高いほど寛容）
      ANOMALY_INBOUND: "5"
      ANOMALY_OUTBOUND: "4"
      # リクエストボディサイズ上限（アバター画像アップロード対応: 10MB）
      MODSEC_REQ_BODY_LIMIT: "10485760"
      MODSEC_REQ_BODY_NOFILES_LIMIT: "1048576"
    ports:
      - "80:80" # HTTP → HTTPSリダイレクト用
      - "443:443" # HTTPS
    volumes:
      # SSL証明書をマウント（make ssl で生成）
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - trans_network

  # HashiCorp Vault（秘密情報管理）
  vault:
    image: hashicorp/vault:latest
    container_name: trans_vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      # /v1/sys/health は vault の状態によって異なる HTTP ステータスを返す:
      #   200=active, 429=standby, 501=uninitialized, 503=sealed
      # 現状は dev モードで auto-unseal されるが、将来 prod vault へ切替時の
      # 回帰を防ぐためクエリパラメータで sealed/standby/uninit も 200 扱いにする
      test:
        [
          "CMD-SHELL",
          "wget -qO- 'http://127.0.0.1:8200/v1/sys/health?standbyok=true&sealedcode=200&uninitcode=200' || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trans_network

  # PostgreSQLデータベース
  postgres:
    image: postgres:15-alpine
    container_name: trans_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./test/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transcendence"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - trans_network

  # NestJSバックエンド
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trans_backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      CSRF_SECRET: ${CSRF_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT}
      NODE_ENV: ${NODE_ENV}
      FRONTEND_URL: ${FRONTEND_URL}
      SKIP_AUTH: ${SKIP_AUTH}
      # --- 42 OAuth連携用 ---
      FORTY_TWO_CLIENT_ID: ${FORTY_TWO_CLIENT_ID}
      FORTY_TWO_CLIENT_SECRET: ${FORTY_TWO_CLIENT_SECRET}
      FORTY_TWO_CALLBACK_URL: ${FORTY_TWO_CALLBACK_URL}
      # --------------------
      # Vault 接続設定
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
      # --- メール設定（GDPR通知メール用）---
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
      - ./shared:/shared
      - ./test:/test
      - backend_node_modules:/app/node_modules
    depends_on:
      - postgres
      - vault
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trans_network
    command: npm run start:dev

  # Reactフロントエンド
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: trans_frontend
    restart: unless-stopped
    env_file:
      - .env # ★ここを追加
    environment:
      VITE_API_URL: ${VITE_API_URL}
      PORT: ${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - ./shared:/shared
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - trans_network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  trans_network:
    driver: bridge
