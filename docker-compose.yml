services:
  # HashiCorp Vault（秘密情報管理）
  vault:
    image: hashicorp/vault:latest
    container_name: trans_vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - trans_network


  # PostgreSQLデータベース
  postgres:
    image: postgres:15-alpine
    container_name: trans_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trans_network

  # NestJSバックエンド
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trans_backend
    restart: unless-stopped
    environment:
      DATABASE_HOST: ${POSTGRES_HOST}
      DATABASE_PORT: ${POSTGRES_PORT}
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT}
      NODE_ENV: ${NODE_ENV}
      FRONTEND_URL: ${FRONTEND_URL}
      SKIP_AUTH: ${SKIP_AUTH}
      # --- 42 OAuth連携用 ---
      FORTY_TWO_CLIENT_ID: ${FORTY_TWO_CLIENT_ID}
      FORTY_TWO_CLIENT_SECRET: ${FORTY_TWO_CLIENT_SECRET}
      FORTY_TWO_CALLBACK_URL: ${FORTY_TWO_CALLBACK_URL}
      # --------------------
      # Vault 接続設定
      VAULT_ADDR: ${VAULT_ADDR}
      VAULT_TOKEN: ${VAULT_TOKEN}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend:/app
      - ./shared:/shared
      - backend_node_modules:/app/node_modules
    depends_on:
      - postgres
      - vault
    networks:
      - trans_network
    command: npm run start:dev

  # Reactフロントエンド
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trans_frontend
    restart: unless-stopped
    env_file:
      - .env  # ★ここを追加
    environment:
      VITE_API_URL: ${VITE_API_URL}
      PORT: ${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend:/app
      - ./shared:/shared
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - trans_network
    command: npm run dev

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local

networks:
  trans_network:
    driver: bridge