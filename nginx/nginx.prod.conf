# ============================================================
# Nginx リバースプロキシ設定 (本番モード)
# ============================================================
# 役割:
#   - HTTPS (TLS) 終端 → 内部はHTTPでバックエンドに転送
#   - HTTP (80) → HTTPS (443) リダイレクト
#   - /api/**       → backend:3000 (NestJS)
#   - /uploads/**   → backend:3000 (静的ファイル)
#   - /socket.io/** → backend:3000 (WebSocket)
#   - /**           → /usr/share/nginx/html (Vite ビルド済み静的ファイル)
#
# 開発モードとの違い:
#   1. location / : Vite dev server へのプロキシではなく静的配信
#   2. CSP から script-src の 'unsafe-inline' を除去
#      (Vite ビルド後はインラインスクリプトを使わないため)
# ============================================================

# --- HTTP: 全リクエストをHTTPSへリダイレクト ---
server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

# --- HTTPS: メインサーバー ---
server {
    listen 443 ssl;
    server_name localhost;

    # ビルド済みフロントエンドを配信するルート
    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------
    # SSL/TLS 証明書の設定
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ----------------------------------------------------------
    # セキュリティヘッダー (本番モード)
    # ----------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # CSP: 本番モードでは script-src から 'unsafe-inline' を除去
    # Vite ビルド後は bundle 化されインラインスクリプトを使わない
    # style-src は React のインラインスタイルに備えて 'unsafe-inline' を残す
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss://localhost" always;

    # ----------------------------------------------------------
    # APIリクエスト → NestJSバックエンド (backend:3000)
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------
    # アップロードファイル → NestJS静的配信 (backend:3000)
    # ----------------------------------------------------------
    location /uploads/ {
        proxy_pass       http://backend:3000/uploads/;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # WebSocket (socket.io) → NestJS (backend:3000)
    # ----------------------------------------------------------
    location /socket.io/ {
        modsecurity off;
        proxy_pass         http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------
    # ヘルスチェック用エンドポイント
    # ----------------------------------------------------------
    location /healthz {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ----------------------------------------------------------
    # その他すべて → ビルド済み静的ファイル
    # ----------------------------------------------------------
    # SPA ルーティング保険: 存在しないパスでも index.html を返す
    # 現状 React Router 未使用だが、deep link や誤入力対策として
    location / {
        try_files $uri $uri/ /index.html;
    }
}
