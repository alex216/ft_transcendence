# ============================================================
# ModSecurity チューニング（Override）設定
# このファイルは modsecurity-override.conf として展開され
# CRS ルールセットより前に読み込まれる
# ============================================================

# ----------------------------------------------------------
# 誤検知除外: Content-Type ポリシー（920420）
# API が application/json を使うため除外
# ----------------------------------------------------------
SecRuleRemoveById 920420

# ----------------------------------------------------------
# 誤検知除外: multipart リクエストの厳格な検証（200002, 200003）
# multer によるファイルアップロードで誤検知が発生するため除外
# ----------------------------------------------------------
SecRuleRemoveById 200002
SecRuleRemoveById 200003

# ----------------------------------------------------------
# 誤検知除外: 42 OAuth コールバック（長いクエリパラメータ）
# GET /auth/42/callback?code=xxx が誤検知するため除外
# ----------------------------------------------------------
SecRule REQUEST_URI "@beginsWith /auth/42/callback" \
    "id:9001,phase:1,pass,nolog,ctl:ruleEngine=Off"

# ----------------------------------------------------------
# 誤検知除外: Vite dev server の /@fs/ プレフィックス
# dev 環境では frontend/ 外の shared/ ディレクトリが
# /@fs/shared/... 経由で配信されるため、LFI 検出ルール群
# （OWASP_CRS/ATTACK-LFI タグのルール: 930100/930110/930120/930130 等）に
# マッチしてしまう。dev 専用の内部パスなので当該プレフィックスは WAF を無効化
# ※本番ビルドでは /@fs/ は使用されないため影響なし
# ----------------------------------------------------------
SecRule REQUEST_URI "@rx ^/@fs/" \
    "id:9002,phase:1,pass,nolog,ctl:ruleEngine=Off"
