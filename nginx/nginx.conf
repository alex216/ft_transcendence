# ============================================================
# Nginx リバースプロキシ設定
# ============================================================
# 役割:
#   - HTTPS (TLS) 終端 → 内部はHTTPでバックエンド/フロントに転送
#   - HTTP (80) → HTTPS (443) リダイレクト
#   - /api/**      → backend:3000 (NestJS)
#   - /uploads/**  → backend:3000 (静的ファイル)
#   - /socket.io/** → backend:3000 (WebSocket)
#   - /**          → frontend:3001 (React)
# ============================================================

# --- HTTP: 全リクエストをHTTPSへリダイレクト ---
server {
    listen 80;
    server_name localhost;

    # 301 Moved Permanently でHTTPSへ転送
    # ブラウザは次回から自動的にHTTPSでアクセスする
    return 301 https://$host$request_uri;
}

# --- HTTPS: メインサーバー ---
server {
    listen 443 ssl;
    server_name localhost;

    # ----------------------------------------------------------
    # SSL/TLS 証明書の設定
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;

    # TLSv1.2 / TLSv1.3 のみ許可（古い1.0/1.1は脆弱性あり）
    ssl_protocols       TLSv1.2 TLSv1.3;

    # 強いcipher suiteのみ許可（弱い暗号方式を排除）
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # セッション再利用でTLSハンドシェイクのオーバーヘッドを削減
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ----------------------------------------------------------
    # セキュリティヘッダー
    # ----------------------------------------------------------
    # HTTPS強制（ブラウザに「このサイトはHTTPSのみ」と伝える）
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # クリックジャッキング対策（iframe埋め込みを禁止）
    add_header X-Frame-Options DENY always;

    # MIMEタイプスニッフィング防止
    add_header X-Content-Type-Options nosniff always;

    # XSS保護（古いブラウザ向け）
    add_header X-XSS-Protection "1; mode=block" always;

    # ----------------------------------------------------------
    # APIリクエスト → NestJSバックエンド (backend:3000)
    # ----------------------------------------------------------
    # 例: https://localhost/api/auth/login
    #       → http://backend:3000/auth/login
    # ※ proxy_pass末尾の "/" が /api/ プレフィックスを除去する
    location /api/ {
        proxy_pass         http://backend:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # バックエンドにHTTPS経由でアクセスされたことを伝える
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------
    # アップロードファイル → NestJS静的配信 (backend:3000)
    # ----------------------------------------------------------
    location /uploads/ {
        proxy_pass       http://backend:3000/uploads/;
        proxy_set_header Host $host;
    }

    # ----------------------------------------------------------
    # WebSocket (socket.io) → NestJS (backend:3000)
    # ----------------------------------------------------------
    # WebSocketはHTTPから"アップグレード"するプロトコル
    # Upgrade / Connection ヘッダーが必要
    location /socket.io/ {
        proxy_pass         http://backend:3000/socket.io/;
        proxy_http_version 1.1;
        # WebSocketアップグレードに必要なヘッダー
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ----------------------------------------------------------
    # その他すべて → Reactフロントエンド (frontend:3001)
    # ----------------------------------------------------------
    location / {
        proxy_pass         http://frontend:3001;
        proxy_http_version 1.1;
        # Viteの開発サーバーもWebSocketを使うのでUpgradeが必要
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
